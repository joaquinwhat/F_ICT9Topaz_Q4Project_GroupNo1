<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Better OBMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body {
        background-color: #f8f9fa; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: url('https://i.pinimg.com/1200x/07/b8/2d/07b82d9d64531d25b9900939119653c1.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
    }

#form-box {
    background-color: rgba(255, 255, 255, 0.8);
    padding: 50px;   
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 550px;     
    text-align: center;
}

    .title {
        color: #333;
        font-weight: bold;
    }
    
    #message {
        font-size: 0.85rem;
        margin-top: 10px;
        color: #6c757d;
    }
</style>

<body>

    <div class="RedApps">
        <div id="form-box">

            <h4 class="title mb-3">Login to Account</h4>
            <button class="btn btn-light w-100 mb-2" data-bs-toggle="collapse" data-bs-target="#instructions">Show Instructions</button>

            <div class="collapse mb-3" id="instructions">
                <div class="card card-body">
                    <p>Please enter all of your credentials in the specified fields.</p>
                </div>
            </div>

            <input type ="text" id="user" class="form-control mb-2" placeholder="Username">
            <input type ="password" class="form-control mb-2" placeholder="Password">
            <div class="form-check text-start">
                <input class="form-check-input" type="checkbox" id="checkboxID" onclick="showMessage()">
                <label class="form-check-label">Remember me</label>
            </div>

            <p id="message"></p>
            <button class="btn btn-info w-100 mt-2" onclick="checkLogin()">Login</button>
        </div> 

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showMessage() {
            var checkbox = document.getElementById("checkboxID");
            var message = document.getElementById("message");

            if (checkbox.checked) {
                message.textContent = "The system will remember this device.";
            } else {
                message.textContent = "The system will not remember this device.";
            }
        }

        function checkLogin() {
            var usernameinput = document.getElementById("user");
            var username = usernameinput.value;

            if (username.trim() !== "") {
            localStorage.setItem("studentName", username);

            alert("Welcome " + username + ", to our very own website.");
            window.location.href = "dashboard.html";
            } else {
                alert("Please enter a username.");
            }
        }
    </script>
</body>
</html>
