<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      
      body {
            background-image: url('https://i.pinimg.com/1200x/07/b8/2d/07b82d9d64531d25b9900939119653c1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
      .sidebar {
            width: 100px;
            height: 100vh;
            background-color: white;
            position: fixed;
            border-right: 1px solid #b7b7b7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 70px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

      .sidebar a {
            font-size: 32px;
            color: rgb(82, 186, 234);
            margin-bottom: 38px;
            transition: 0.3s;
            text-decoration: none;
        }

      .sidebar a:hover {
        transform: scale(1.2);
        }

      .main-container {
            margin-left: 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: white;
            padding: 15px 30px;
            border-bottom: 1px solid #b7b7b7;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .logo { 
            height: 50px; 
            border-radius: 15px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: #fdfdfd;
            border-radius: 16px;
            margin: 0 auto 15px;
            font-size: 60px;
            border: 2px solid #f0f0f0;
        }

        .card {
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: none;
        }

        .content {
            margin: 35px;
        }     

    </style>
</head>
<body>

    <div class="d-flex">
        <div class="sidebar">
            <a href="dashboard.html"><i class="bi bi-house-door-fill"></i></a>
            <a href="notebooks.html"><i class="bi bi-journal-text"></i></a>
            <a href="tasks.html"><i class="bi bi-folder-fill"></i></a>
            <a href="user_profile.html"><i class="bi bi-gear-fill"></i></a>
        </div>

        <div class="main-container w-100">

            <nav class="navbar d-flex justify-content-between align-items-center">
                <img src="https://i1-e.pinimg.com/1200x/05/d8/2e/05d82e73f78e5411d409a2f5beebaaee.jpg" alt="Logo" class="logo">
                <a href="user_profile.html" class="btn-profile">User Profile</a>
            </nav>

            <div class="p-4 content">
                <div class="row g-5">

                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="profile-img">
                            <i class="bi bi-person-circle"></i>
                            </div>
                            <h5 id="displayName">Name</h5>
                            <p class="">Grade 9-Student</p>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card">
                            <h3 class="mb-4">Sir Renn's Bodyguard Party</h3>
                            <img src="https://www.image2url.com/r2/default/images/1776991337936-5ecc6509-695d-482c-abb7-292deea4ab58.png" alt="Dashboard Content" 
                              class="img-fluid">
                            <p></p>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>


    <script>
        var savedname = localStorage.getItem("studentName");
        if (savedname) {
            document.getElementById("displayName").textContent = savedname;
        } else {
            document.getElementById("displayName").textContent = "Guest";
        }
    




        
    </script>

</body>
</html>
