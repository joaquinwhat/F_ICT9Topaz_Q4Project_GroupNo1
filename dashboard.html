<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            width: 80px;
            min-height: 100vh;
            background: #1a237e;
            color: white;
        }
        .main-container {
            flex: 1;
            background-color: #f8f9fa;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: #ddd;
            border-radius: 10px;
            margin: 0 auto 15px;
        }
    </style>
</head>
<body>

    <div class="d-flex">
        
        <div class="sidebar d-flex flex-column align-items-center py-4">
            <div class="mb-4">🏠</div>
            <div class="mb-4">📖</div>
            <div class="mb-4">📁</div>
            <div class="mb-4">📅</div>
        </div>

        <div class="main-container">
            
            <nav class="navbar bg-white border-bottom p-3">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">OBMC Logo</span>
                    <span>User Profile</span>
                </div>
            </nav>

            <div class="p-4">
                <div class="row">
                    <div class="col-md-3">
                        <div class="card p-4 text-center border-0 shadow-sm">
                            <div class="profile-img">
                                👤
                            </div>
                            <h5 id="displayName" class="mb-0">Name</h5>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card p-4 border-0 shadow-sm">
                            <P>content here</P>
                        </div>
                    </div>
            </div>

        </div>

    </div>


    <script>
        var savedname = localStorage.getItem("studentName");
        if (savedname) {
            document.getElementById("displayName").textContent = savedname;
        } else {
            document.getElementById("displayName").textContent = "Guest";
        }
        
    </script>

</body>
</html>
